name: Test Setup

on:
  workflow_dispatch:  # Manual trigger only

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check required secrets
        env:
          MY_EMAIL: ${{ secrets.MY_EMAIL }}
          MY_PASSWORD: ${{ secrets.MY_PASSWORD }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_RECEIVER_NRO: ${{ secrets.TWILIO_RECEIVER_NRO }}
          TWILIO_FROM_NRO: ${{ secrets.TWILIO_FROM_NRO }}
        run: |
          echo "Checking secrets..."

          if [ -z "$MY_EMAIL" ]; then echo "MY_EMAIL missing"; exit 1; else echo "MY_EMAIL OK"; fi
          if [ -z "$MY_PASSWORD" ]; then echo "MY_PASSWORD missing"; exit 1; else echo "MY_PASSWORD OK"; fi
          if [ -z "$TWILIO_ACCOUNT_SID" ]; then echo "TWILIO_ACCOUNT_SID missing"; exit 1; else echo "TWILIO_ACCOUNT_SID OK"; fi
          if [ -z "$TWILIO_AUTH_TOKEN" ]; then echo "TWILIO_AUTH_TOKEN missing"; exit 1; else echo "TWILIO_AUTH_TOKEN OK"; fi
          if [ -z "$TWILIO_RECEIVER_NRO" ]; then echo "TWILIO_RECEIVER_NRO missing"; exit 1; else echo "TWILIO_RECEIVER_NRO OK"; fi
          if [ -z "$TWILIO_FROM_NRO" ]; then echo "TWILIO_FROM_NRO missing"; exit 1; else echo "TWILIO_FROM_NRO OK"; fi

          echo "All secrets configured!"

      - name: Check required files exist
        run: |
          echo "Checking files..."

          test -f main.py && echo "main.py OK" || (echo "main.py missing" && exit 1)
          test -f requirements.txt && echo "requirements.txt OK" || (echo "requirements.txt missing" && exit 1)

      - name: Test Python syntax
        run: python -m py_compile main.py

      - name: Test external API access (ISS + Sunrise)
        run: |
          echo "Testing APIs..."

          python << 'EOF'
          import requests
          
          print('Testing ISS API...')
          iss = requests.get('http://api.open-notify.org/iss-now.json')
          print('ISS API status:', iss.status_code)
          
          print('Testing Sunrise API...')
          sun = requests.get('https://api.sunrise-sunset.org/json?lat=0&lng=0&formatted=0')
          print('Sunrise API status:', sun.status_code)
          EOF

      - name: Success
        run: |
          echo '========================================'
          echo ' ALL TESTS PASSED'
          echo '========================================'
